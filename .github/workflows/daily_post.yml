name: Daily Inburi News

on:
  workflow_dispatch: 

jobs:
  post_news:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries & Playwright
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai pytz beautifulsoup4 playwright
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run Main Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          TOMORROW_API_KEY: ${{ secrets.TOMORROW_API_KEY }}
          TMD_API_KEY: ${{ secrets.TMD_API_KEY }}
          EE_JSON_KEY: ${{ secrets.EE_JSON_KEY }}
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
        run: python main.py
