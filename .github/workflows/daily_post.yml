name: Daily Inburi News

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: 

jobs:
  post_news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries & Playwright
        run: |
          python -m pip install --upgrade pip
          # ติดตั้งเครื่องมือทั้งหมด รวมถึง BeautifulSoup ของ ChatGPT และ Playwright ของผม
          pip install requests google-genai pytz beautifulsoup4 playwright
          # จำลองเบราว์เซอร์ Chrome ขึ้นมาบนเซิร์ฟเวอร์เพื่อหลอกเว็บรัฐบาล
          playwright install chromium --with-deps

      - name: Run Main Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: python main.py
