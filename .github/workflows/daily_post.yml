name: Daily Inburi News

on:
  schedule:
    # 23:00 UTC = 06:00 น. เวลาประเทศไทย
    - cron: '0 23 * * *'
  workflow_dispatch: 

jobs:
  post_news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        # ติดตั้ง pytz เพื่อจัดการเวลา และเครื่องมือดึงข้อมูลให้ครบ
        run: pip install requests google-genai pytz

      - name: Run Main Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: python main.py
