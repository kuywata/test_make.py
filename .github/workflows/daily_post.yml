name: Daily Inburi News

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  post_news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries & Playwright
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai pytz playwright
          playwright install chromium --with-deps

      - name: Run Main Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: python main.py

      - name: Commit and Push State (If Changed)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # สร้างไฟล์ไว้ก่อนเสมอ เพื่อป้องกัน Error "pathspec 'state.json' did not match any files"
          touch state.json
          git add state.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "อัปเดต State บันทึกข้อมูลน้ำล่าสุด" && git push)
