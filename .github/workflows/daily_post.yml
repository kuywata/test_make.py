name: Daily Inburi News

on:
  schedule:
    # เพิ่มเวลา 08:00 UTC (บ่าย 3 ไทย) และ 23:00 UTC (6 โมงเช้าไทย)
    - cron: '0 8,23 * * *'
  workflow_dispatch: 

jobs:
  post_news:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries & Playwright
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai pytz beautifulsoup4 playwright
          playwright install chromium --with-deps

      - name: Run Main Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: python main.py
